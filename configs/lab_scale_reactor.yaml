# Lab-scale reactor configuration (10L vessel)
# Demonstrates how reactor properties are modular and separate from chemistry

reactor:
  volume_m3: 0.01             # m³ (10L working volume)
  vessel_volume_L: 12.0       # L (12L total capacity)
  pressure_bar: 1.0           # bar (atmospheric pressure)
  agitator_speed_rpm: 200     # rpm (faster agitation in small vessel)

# Vessel geometry — small lab glass reactor
geometry:
  type: cylindrical_flat
  diameter_m: 0.22            # m, inner diameter (~220 mm)
  height_m: 0.32              # m, straight-side height

# Mixing model — lab-scale pitched-blade impeller
mixing:
  enabled: true
  impeller_diameter_m: 0.07   # m, ~D_tank/3
  power_number: 1.3           # pitched-blade turbine
  impeller_type: pitched_blade
  n_blades: 4
  wall_thickness_m: 0.003     # m, borosilicate glass (3 mm)
  wall_conductivity: 1.1      # W/(m·K), borosilicate glass
  h_jacket: 500.0             # W/(m²·K), lab jacket flow
  fluid_thermal_conductivity: 0.17  # W/(m·K)

# Use legacy Kamal-Sourour chemistry (same as production reactor)
kinetics:
  A1: 1.0e+4           # s^-1, pre-exponential (catalytic path)
  Ea1: 55000.0         # J/mol, activation energy path 1
  A2: 1.0e+6           # s^-1, pre-exponential (autocatalytic path)
  Ea2: 45000.0         # J/mol, activation energy path 2
  m: 0.5               # autocatalytic exponent
  n: 1.5               # reaction order exponent
  delta_H: 350.0       # kJ/kg of component_a, total heat of reaction
  alpha_gel: 0.6       # gel point conversion

thermal:
  Cp: 1.8              # kJ/(kg*K), specific heat of mixture
  UA: 0.2              # kW/K, smaller heat transfer area in lab reactor

viscosity:
  eta_0: 0.5           # Pa*s, initial viscosity at alpha=0
  C_visc: 4.0          # dimensionless shape parameter
  alpha_gel: 0.6       # gel point

physics:
  stoich_ratio: 0.3       # kg component_b consumed per kg component_a consumed
  max_temp: 500.0         # K, safety cap for numerical stability
  R_gas: 8.314            # J/(mol*K), universal gas constant
  density_component_a: 1.16     # kg/L, component A (liquid)
  density_component_b: 0.97  # kg/L, component B
  density_product: 1.20   # kg/L, reaction product
  density_solvent: 0.87   # kg/L, organic solvent

controller:
  cure_temp_K: 353.15         # K, target cure temperature
  cool_done_temp_K: 313.15    # K, cool enough to discharge
  runaway_temp_K: 473.15      # K, absolute temperature alarm
  runaway_dT_dt: 2.0          # K/s, rate-of-rise alarm
  conversion_done: 0.95       # reaction essentially complete
  dt_window: 10               # rolling window for dT/dt

initial_conditions:
  temperature: 298.15         # K
  jacket_temperature: 298.15  # K

solver:
  horizon: 2.0                # seconds per solve
  n_finite_elements: 5        # collocation finite elements per horizon
  collocation_points: 3       # Radau points per element
  solver_name: ipopt
  solver_options:
    max_iter: 1000
    tol: 1.0e-6
    mu_strategy: adaptive
    print_level: 0
